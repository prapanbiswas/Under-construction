<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Something New</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Using a clean sans-serif stack to match the modern, bold feel of the mascot */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
        }
        .accent-yellow { color: #FFC107; }
        .bg-accent { background-color: #FFC107; }
    </style>
</head>
<body class="h-screen flex flex-col justify-center items-center text-white p-6">
    
    <div class="flex flex-col items-center text-center">
        <!-- Mascot Image -->
        <img 
            src="1000123593.png" 
            alt="Mascot coding" 
            class="w-64 h-64 object-contain mb-6 drop-shadow-2xl"
        >
        
        <!-- Typography aligned with mascot aesthetic -->
        <h1 class="text-4xl font-bold tracking-tight mb-2 uppercase">
            Coming <span class="accent-yellow">Soon</span>
        </h1>
        <p class="text-gray-400 font-light tracking-wide text-lg">
            We are cooking up something special.
        </p>

        <!-- Minimalist decorative element -->
        <div class="mt-12 w-16 h-1 bg-accent rounded-full"></div>
    </div>

</body>
</html>
